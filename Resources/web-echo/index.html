<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantomSwift God Mode Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #22c55e; color: #fff; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        
        .section-title { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .panel { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; 
            background: #3b82f6; color: white; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .btn.danger { background: #ef4444; }
        
        .terminal { background: #000; padding: 15px; border-radius: 12px; height: 350px; overflow-y: auto; border: 1px solid #333; font-family: 'SF Mono', monospace; margin-bottom: 10px; }
        .terminal-input-container { display: flex; gap: 10px; }
        #terminal-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #22c55e; padding: 10px; border-radius: 8px; outline: none; font-family: 'SF Mono', monospace; }
        
        .log-entry { font-size: 13px; margin-bottom: 8px; color: #3b82f6; border-left: 2px solid #3b82f6; padding-left: 10px; }
        .log-time { color: #555; margin-right: 10px; }
        .term-res { color: #22c55e; margin: 5px 0 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin:0">PhantomSwift 🧪</h1>
            <p style="color:#666; margin:0">God Mode: Remote REPL & Control</p>
        </div>
        <span class="status" id="ws-status">DISCONNECTED</span>
    </div>

    <div class="grid">
        <div style="display:flex; flex-direction:column; gap:20px">
            <div class="panel">
                <div class="section-title">Remote Terminal (REPL)</div>
                <div class="terminal" id="terminal-out">
                    <div style="color:#666">Type 'app-info' or 'system-status' to begin...</div>
                </div>
                <div class="terminal-input-container">
                    <input type="text" id="terminal-input" placeholder="Execute command..." onkeydown="if(event.key==='Enter') runEval()">
                    <button class="btn" style="width:100px; margin:0" onclick="runEval()">RUN</button>
                </div>
            </div>
            
            <div class="panel">
                <div class="section-title">Device Logs</div>
                <div id="logs" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
        
        <div class="panel">
            <div class="section-title">Quick Actions</div>
            <button class="btn" onclick="sendCommand('trigger-bug-report')">📸 Screenshot & Report</button>
            <button class="btn" onclick="sendCommand('toggle-bad-network')">🌐 Toggle Bad Network</button>
            <button class="btn" onclick="sendCommand('eval:clear-cache')">🧹 Clear URL Cache</button>
            <button class="btn danger" onclick="sendCommand('reset-defaults')">⚠️ Reset UserDefaults</button>
        </div>
    </div>

    <script>
        const logsContainer = document.getElementById('logs');
        const termOut = document.getElementById('terminal-out');
        const termIn = document.getElementById('terminal-input');
        const statusBadge = document.getElementById('ws-status');
        let socket;

        function connect() {
            const host = window.location.hostname || 'localhost';
            socket = new WebSocket(`ws://${host}:8080/webecho`);
            
            socket.onopen = () => {
                statusBadge.innerText = 'CONNECTED';
                statusBadge.style.background = '#22c55e';
            };

            socket.onclose = () => {
                statusBadge.innerText = 'DISCONNECTED';
                statusBadge.style.background = '#ef4444';
                setTimeout(connect, 2000);
            };

            socket.onmessage = (event) => {
                const msg = event.data;
                if (msg.startsWith('eval-result:')) {
                    addTermResult(msg.replace('eval-result:', ''));
                } else {
                    addLog(msg);
                }
            };
        }

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span>${msg}`;
            logsContainer.prepend(entry);
        }

        function addTermResult(res) {
            const entry = document.createElement('div');
            entry.className = 'term-res';
            entry.innerText = res;
            termOut.appendChild(entry);
            termOut.scrollTop = termOut.scrollHeight;
        }

        function sendCommand(cmd) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(cmd);
            }
        }

        function runEval() {
            const cmd = termIn.value.trim();
            if (!cmd) return;
            
            const entry = document.createElement('div');
            entry.style.color = '#3b82f6';
            entry.innerText = '> ' + cmd;
            termOut.appendChild(entry);
            
            sendCommand('eval:' + cmd);
            termIn.value = '';
        }

        connect();
    </script>
</body>
</html>
